<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        background-color: rgb(122, 154, 37);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        width: 400px;
        background-color: rgb(131, 30, 225);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
      }

      label {
        display: block;
        margin-top: 10px;
        color: rgb(72, 255, 0);
        font-size: large;
        margin-bottom: 2px;
      }
      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        border: none;
        border-radius: 5px;
      }

      button {
        width: 100%;
        padding: 10px;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        background-color: rgb(122, 154, 37);
        color: white;
      }
      button:hover {
        background-color: rgb(158, 207, 21);
      }

      small {
        color: red;
        display: block;
        margin-top: 5px;
      }

      .error {
        border: 2px solid red;
      }

      .success {
        border: 2px solid green;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <form id="myFrom">
        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name" />
        <small id="nameError"></small>
        <!--  -->
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your Email" />
        <small id="emailError"></small>
        <!--  -->
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter Password" />
        <small id="passwordError"></small>

        <button type="submit">Register</button>
      </form>
    </div>

    <script src="index.js"></script>
  </body>
</html>
